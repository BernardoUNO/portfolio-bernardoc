<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comentários - Jay-Z</title>
    <link rel="stylesheet" href="stilo.css">
</head>
<body>

    <header>
        <h1>Mande seu Salve!</h1>
        <nav>
            <a href="index.html" class="btn-nav">Voltar para Início</a>
        </nav>
    </header>

    <main>
        <section id="area-comentarios">
            <h2>Comentários dos Fãs</h2>
            
            <div id="lista-comentarios">
                <div class="comentario">
                    <p><strong>Beyoncé:</strong> Orgulho do meu marido! ❤️</p>
                </div>
            </div>

            <div class="form-container">
                <h3>Deixe sua mensagem</h3>
                <form id="meuForm">
                    <input type="text" id="nome" placeholder="Seu Nome" required>
                    <textarea id="mensagem" placeholder="Sua mensagem..." rows="3" required></textarea>
                    <button type="submit">Enviar Comentário</button>
                </form>
                <div id="resultado"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Biografia Jay-Z - Área de interação</p>
    </footer>  

    <script src="script.js"></script>
</body>
</html>
